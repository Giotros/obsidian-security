# Obsidian Monitoring Preset: WordPress
# Optimized for WordPress/WooCommerce sites on cPanel

monitor_preset = wordpress
monitor_extensions = php,js,htaccess
monitor_exclude_dirs = uploads,cache,wc-logs,upgrade,backups
monitor_critical_files = wp-config.php,.htaccess,wp-settings.php,wp-login.php,index.php
monitor_high_dirs = wp-includes,wp-admin
scan_interval = 21600
