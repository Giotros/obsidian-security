# Obsidian Monitoring Preset: WooCommerce
# Extended WordPress preset with WooCommerce-specific paths

monitor_preset = woocommerce
monitor_extensions = php,js,htaccess
monitor_exclude_dirs = uploads,cache,wc-logs,upgrade,backups,woocommerce_uploads
monitor_critical_files = wp-config.php,.htaccess,wp-settings.php,wp-login.php,index.php
monitor_high_dirs = wp-includes,wp-admin,woocommerce,plugins/woocommerce
scan_interval = 21600
